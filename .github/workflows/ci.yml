name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run unit tests (no real OpenAI/scraping calls)
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
          GMAIL_USER: ""
          GMAIL_APP_PASSWORD: ""
          EMAIL_DESTINATARIO: ""
        run: |
          python -m pytest tests/test_multiagent_logic.py tests/test_browser_concurrency.py \
            -v -m "not integration" --timeout=60

  frontend:
    name: Frontend — TypeScript build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript build
        working-directory: frontend
        run: npm run build
